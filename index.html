<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASEP HIDAYAT | CORE V.31</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root { --n: #bc13fe; --c: #00f2ff; --bg: #020005; --b: rgba(255,255,255,0.08); }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        
        body { background: var(--bg); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        
        #mX { position: fixed; inset: 0; z-index: -1; opacity: 0.15; }

        /* 1. INITIAL BOOT & PIN MENU (MENU AWAL KECE) */
        #bootLayer { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 1s cubic-bezier(0.4, 0, 0.2, 1); }
        .boot-card { background: rgba(255,255,255,0.03); border: 1px solid var(--n); padding: 40px; border-radius: 40px; text-align: center; backdrop-filter: blur(50px); width: 90%; max-width: 400px; box-shadow: 0 0 50px rgba(188, 19, 254, 0.2); }
        .boot-card h1 { font-family: 'Orbitron'; font-size: 1.2rem; letter-spacing: 10px; color: var(--c); margin-bottom: 30px; }
        .pin-input { background: none; border: none; border-bottom: 2px solid var(--n); color: #fff; font-size: 2rem; text-align: center; width: 100%; letter-spacing: 15px; margin-bottom: 30px; font-family: 'Orbitron'; }

        /* 2. DASHBOARD MAIN */
        #mainDash { display: none; width: 100%; max-width: 500px; padding: 20px; flex-direction: column; gap: 20px; opacity: 0; transition: 1.5s; }
        
        header { text-align: center; margin-bottom: 10px; }
        .brand { font-family: 'Orbitron'; font-size: 1.5rem; letter-spacing: 12px; color: var(--c); text-shadow: 0 0 15px var(--c); }

        .card { background: rgba(255,255,255,0.02); border: 1px solid var(--b); border-radius: 30px; padding: 25px; backdrop-filter: blur(30px); position: relative; }
        
        /* USER INFO AREA */
        .user-box { display: flex; align-items: center; gap: 20px; }
        .pfp { width: 55px; height: 55px; border: 2px solid var(--n); border-radius: 18px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-family: 'Orbitron'; box-shadow: 0 0 15px var(--n); }
        .user-id { font-size: 0.6rem; color: #888; font-weight: 800; letter-spacing: 2px; margin-top: 5px; }

        /* DOWNLOADER MENU (BAGUS VERSION) */
        .dl-input-group { position: relative; margin-top: 15px; }
        .dl-input { width: 100%; padding: 18px 20px; background: rgba(0,0,0,0.5); border: 1px solid var(--b); border-radius: 18px; color: #fff; font-size: 0.8rem; }
        .dl-input:focus { border-color: var(--c); }
        .dl-btn { background: var(--n); color: #fff; border: none; border-radius: 15px; padding: 15px; margin-top: 10px; width: 100%; font-weight: 800; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 2px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .dl-btn:hover { box-shadow: 0 0 25px var(--n); transform: scale(1.02); }

        /* IP & STATUS */
        .status-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .stat { background: #000; padding: 12px; border-radius: 15px; border: 1px solid var(--b); text-align: center; }
        .stat label { font-size: 0.5rem; color: #555; display: block; margin-bottom: 5px; }
        .stat span { font-size: 0.7rem; font-family: monospace; color: var(--c); }

        /* COPYRIGHT (CR) */
        .cr { text-align: center; font-size: 0.55rem; color: #444; margin-top: 30px; font-weight: 800; letter-spacing: 5px; }
    </style>
</head>
<body>
    <canvas id="mX"></canvas>

    <div id="bootLayer">
        <div class="boot-card">
            <h1>SYSTEM LOCK</h1>
            <input type="password" id="pI" class="pin-input" maxlength="6" placeholder="******">
            <button onclick="checkPin()" class="dl-btn" style="background:transparent; border:1px solid var(--n);">AUTHENTICATE</button>
            <p style="font-size: 0.5rem; color: #444; margin-top: 20px; letter-spacing: 2px;">SECURE ACCESS ONLY</p>
        </div>
    </div>

    <div id="mainDash">
        <header><h1 class="brand">ASEP.OS</h1></header>

        <div class="card">
            <div class="user-box">
                <div class="pfp">A</div>
                <div class="info">
                    <h3 style="font-family:'Orbitron'; font-size: 0.9rem;">ASEP HIDAYAT</h3>
                    <div class="user-id">ID: 290913-SNIPER-CORE</div>
                </div>
            </div>
            <div class="status-row">
                <div class="stat">
                    <label>CONNECTION</label>
                    <span id="ip">Detecting...</span>
                </div>
                <div class="stat">
                    <label>ACCESS</label>
                    <span style="color:var(--n)">AUTHORIZED</span>
                </div>
            </div>
        </div>

        <div class="card">
            <h2 style="font-size: 0.6rem; color: #666; margin-bottom: 15px; letter-spacing: 2px;">⚡ MEDIA DOWNLOADER</h2>
            <div class="dl-input-group">
                <input type="text" class="dl-input" id="dlUrl" placeholder="Paste link video (TikTok/IG/YT)...">
                <button class="dl-btn" onclick="startDl()">
                    <span>FETCH DATA</span>
                </button>
            </div>
            <p style="font-size: 0.5rem; color: #444; margin-top: 15px; text-align: center;">POWERED BY ASEP_DEV_CLOUD</p>
        </div>

        <div class="cr">© 2026 ASEP HIDAYAT | PRIVATE CORE</div>
    </div>

    <script>
        const PIN_KEY = "290913";

        // Matrix Background
        const canvas = document.getElementById('mX');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const drops = Array(Math.floor(canvas.width/15)).fill(1);
        function drawMatrix() {
            ctx.fillStyle = 'rgba(2, 0, 5, 0.1)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#bc13fe'; ctx.font = '12px monospace';
            drops.forEach((y, i) => {
                const text = String.fromCharCode(0x30A0 + Math.random() * 96);
                ctx.fillText(text, i * 15, y * 15);
                if (y * 15 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(drawMatrix, 40);

        // PIN Logic
        function checkPin() {
            const input = document.getElementById('pI').value;
            if(input === PIN_KEY) {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#00f2ff', '#bc13fe'] });
                document.getElementById('bootLayer').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('bootLayer').style.display = 'none';
                    const dash = document.getElementById('mainDash');
                    dash.style.display = 'flex';
                    setTimeout(() => dash.style.opacity = '1', 50);
                    fetchIP();
                }, 1000);
            } else {
                alert("ACCESS DENIED: WRONG PIN");
                document.getElementById('pI').value = "";
            }
        }

        // Fetch IP
        function fetchIP() {
            fetch('https://api.ipify.org?format=json')
                .then(r => r.json())
                .then(d => document.getElementById('ip').innerText = d.ip)
                .catch(() => document.getElementById('ip').innerText = "LOCAL_CORE");
        }

        // Downloader Simulation
        function startDl() {
            const url = document.getElementById('dlUrl').value;
            if(!url) return alert("Paste linknya dulu Sep!");
            alert("Sistem Downloader sedang memproses link: " + url.substring(0, 20) + "...");
            // Di sini lo bisa sambungin ke API Downloader gratisan kalo mau
        }
    </script>
</body>
</html>
