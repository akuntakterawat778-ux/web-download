<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASEP HIDAYAT | GLOBAL</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root { --n: #bc13fe; --bg: #000; --b: rgba(255,255,255,0.05); --c: #00f2ff; --gold: #ffd700; }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow-x: hidden; }
        
        /* PIN VAULT (V.36 STYLE) */
        #loginLayer { position: fixed; inset: 0; z-index: 1000; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at center, #1a0033 0%, #000 100%); transition: 1s ease; }
        .vault-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(188, 19, 254, 0.3); padding: 50px 30px; border-radius: 40px; text-align: center; backdrop-filter: blur(25px); width: 90%; max-width: 350px; box-shadow: 0 0 30px rgba(188, 19, 254, 0.1); }
        .pin-input { background: rgba(0,0,0,0.5); border: 1px solid var(--b); color: #fff; font-size: 1.8rem; text-align: center; width: 100%; padding: 20px; border-radius: 20px; letter-spacing: 15px; font-family: 'Orbitron'; margin-bottom: 20px; }
        
        /* MAIN DASHBOARD */
        #mainDash { display: none; width: 100%; max-width: 550px; padding: 25px; flex-direction: column; gap: 20px; opacity: 0; transition: 1s; }
        .clock-container { text-align: center; padding: 10px 0; }
        #mainTime { font-family: 'Orbitron'; font-size: 4rem; font-weight: 700; letter-spacing: -2px; }
        #mainDate { font-size: 0.7rem; color: var(--n); letter-spacing: 4px; font-weight: 700; }

        .card { background: rgba(255,255,255,0.02); border: 1px solid var(--b); border-radius: 24px; padding: 20px; backdrop-filter: blur(20px); }
        
        /* DOWNLOADER UNIT */
        .dl-input { width: 100%; padding: 18px; background: rgba(0,0,0,0.6); border: 1px solid var(--b); border-radius: 16px; color: #fff; font-size: 0.8rem; margin-bottom: 12px; border: 1px solid var(--b); }
        .dl-input:focus { border-color: var(--n); }
        .btn-dl { width: 100%; padding: 18px; border-radius: 16px; border: none; background: linear-gradient(45deg, var(--n), #7a09aa); color: #fff; font-weight: 800; font-size: 0.75rem; letter-spacing: 2px; cursor: pointer; }
        
        /* WORLD TIME SCROLL */
        .world-list { max-height: 200px; overflow-y: auto; margin-top: 10px; }
        .world-list::-webkit-scrollbar { width: 3px; }
        .city-item { display: flex; justify-content: space-between; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 12px; margin-bottom: 8px; border: 1px solid var(--b); }
        .special { border-color: var(--gold); color: var(--gold); }
    </style>
</head>
<body>

    <div id="loginLayer">
        <div class="vault-card">
            <h1 style="font-family:Orbitron; font-size:0.6rem; letter-spacing:5px; margin-bottom:30px; color:var(--n)">VERIFY ACCESS</h1>
            <input type="password" id="pI" class="pin-input" maxlength="6" placeholder="••••••">
            <button onclick="checkPin()" class="btn-dl">UNLOCK DASHBOARD</button>
        </div>
    </div>

    <div id="mainDash">
        <div class="clock-container">
            <div id="mainTime">00:00</div>
            <div id="mainDate">LOADING...</div>
        </div>

        <div class="card">
            <h2 style="font-size:0.6rem; color:#444; letter-spacing:2px; margin-bottom:12px">AUTO-DETECT MULTI DOWNLOADER</h2>
            <input type="text" class="dl-input" id="dlUrl" placeholder="Paste TikTok / IG / YT / FB Link...">
            <button class="btn-dl" id="dlBtn" onclick="processDownload()">FETCH DATA</button>
            <p id="status" style="font-size:0.55rem; color:var(--c); margin-top:10px; text-align:center; display:none;">SYSTEM: Processing link...</p>
        </div>

        <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
            <div><span style="font-size:0.8rem; font-weight:700;">ASEP HIDAYAT</span><br><span style="font-size:0.55rem; color:#444;">ID: 290913</span></div>
            <div id="ip" style="font-family:monospace; font-size:0.6rem; color:var(--n);">0.0.0.0</div>
        </div>

        <div class="card">
            <h3 style="font-size: 0.55rem; color: #444; letter-spacing: 2px; margin-bottom: 12px;">GLOBAL TIME INDEX</h3>
            <div class="world-list" id="worldList"></div>
        </div>

        <div style="display:flex; justify-content:space-between; font-size:0.5rem; color:#222;">
            <span>© 2026 ASEP HIDAYAT</span>
            <span>V.37 STABLE BRIDGE</span>
        </div>
    </div>

    <script>
        const PIN_KEY = "290913";
        const cities = [
            { name: "MAKKAH (SAUDI ARABIA)", tz: "Asia/Riyadh", special: true },
            { name: "JAKARTA (INDONESIA)", tz: "Asia/Jakarta" },
            { name: "TOKYO (JAPAN)", tz: "Asia/Tokyo" },
            { name: "LONDON (UNITED KINGDOM)", tz: "Europe/London" },
            { name: "NEW YORK (USA)", tz: "America/New_York" }
        ];

        // Fill to 130 cities
        Intl.supportedValuesOf('timeZone').slice(0, 125).forEach(tz => {
            if(!cities.find(c => c.tz === tz)) cities.push({ name: tz.split('/').pop().replace(/_/g, ' ').toUpperCase(), tz: tz });
        });

        function checkPin() {
            if(document.getElementById('pI').value === PIN_KEY) {
                confetti({ particleCount: 150, spread: 60, colors: ['#bc13fe', '#00f2ff'] });
                document.getElementById('loginLayer').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loginLayer').style.display = 'none';
                    document.getElementById('mainDash').style.display = 'flex';
                    setTimeout(() => document.getElementById('mainDash').style.opacity = '1', 50);
                    startTime(); fetchIP();
                }, 800);
            } else { alert("WRONG PIN"); document.getElementById('pI').value = ""; }
        }

        // --- CENTRAL DOWNLOADER ENGINE ---
        async function processDownload() {
            const url = document.getElementById('dlUrl').value;
            const btn = document.getElementById('dlBtn');
            const status = document.getElementById('status');

            if(!url) return alert("Paste linknya dulu Sep!");

            btn.disabled = true;
            btn.innerText = "PROCESSING...";
            status.style.display = "block";

            try {
                // Kita pake endpoint universal bridge (AIO)
                const api = `https://api.vreden.my.id/api/download/allinone?url=${encodeURIComponent(url)}`;
                const response = await fetch(api);
                const data = await response.json();

                if(data.status && data.result) {
                    // Cek tipe media (video/image)
                    const downloadUrl = data.result.video || data.result.url || data.result.mp4;
                    window.open(downloadUrl, '_blank');
                    status.innerText = "SUCCESS: Media Found!";
                } else {
                    throw new Error();
                }
            } catch (e) {
                alert("API Limit atau Link Salah. Gunakan link lain Sep!");
                status.innerText = "ERROR: API Busy.";
            } finally {
                btn.disabled = false;
                btn.innerText = "FETCH DATA";
                setTimeout(() => { status.style.display = "none"; }, 3000);
            }
        }

        function startTime() {
            const listEl = document.getElementById('worldList');
            const update = () => {
                const now = new Date();
                document.getElementById('mainTime').innerText = now.toLocaleTimeString('id-ID', { hour12:false, hour:'2-digit', minute:'2-digit' });
                document.getElementById('mainDate').innerText = now.toLocaleDateString('en-US', { weekday:'long', day:'numeric', month:'long' });
                let html = "";
                cities.forEach(c => {
                    const timeStr = now.toLocaleTimeString('id-ID', { timeZone: c.tz, hour12:false, hour:'2-digit', minute:'2-digit' });
                    html += `<div class="city-item ${c.special?'special':''}">
                                <span style="font-size:0.6rem; font-weight:700;">${c.name}</span>
                                <span style="font-family:Orbitron; font-size:0.8rem;">${timeStr}</span>
                             </div>`;
                });
                listEl.innerHTML = html;
            };
            setInterval(update, 1000); update();
        }

        function fetchIP() {
            fetch('https://api.ipify.org?format=json').then(r => r.json()).then(d => document.getElementById('ip').innerText = d.ip);
        }
    </script>
</body>
</html>
